# ============================================================
# DEPLOYMENT + SERVICE COMPLETO (manifiesto combinado)
# ============================================================
# En Kubernetes es común poner múltiples recursos en un solo archivo YAML.
# Se separan con "---" (tres guiones).
#
# Este archivo despliega:
#   1. Un Deployment con 3 réplicas de nginx
#   2. Un Service NodePort para acceder desde fuera del cluster
#
# Flujo completo:
#   Usuario → NodePort:30090 → Service → Pods (balanceo automático)
#
# DEMO COMPLETA:
#   kubectl apply -f 03-deployment-y-service-completo.yaml
#   kubectl get all -l app=nginx-web
#
#   # Verificar desde fuera:
#   curl http://192.168.109.200:30090
#   curl http://192.168.109.201:30090
#
#   # Ver a qué Pods está distribuyendo el Service:
#   kubectl get endpoints nginx-web-svc
#
#   # Escalar y ver que el Service detecta los nuevos Pods:
#   kubectl scale deployment nginx-web --replicas=5
#   kubectl get endpoints nginx-web-svc
#
#   # Limpiar todo de una vez:
#   kubectl delete -f 03-deployment-y-service-completo.yaml
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  labels:
    app: nginx-web
spec:
  replicas: 10
  selector:
    matchLabels:
      app: nginx-web
  template:
    metadata:
      labels:
        app: nginx-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

---   # Separador entre recursos en el mismo archivo

apiVersion: v1
kind: Service
metadata:
  name: nginx-web-svc
  labels:
    app: nginx-web
spec:
  type: NodePort
  selector:
    app: nginx-web            # Conecta con el Deployment de arriba
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30090
