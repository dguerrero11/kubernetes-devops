# ============================================================
# SECRET - Tipo Opaque (genérico)
# ============================================================
# Un Secret es como un ConfigMap pero para datos SENSIBLES:
#   contraseñas, tokens, claves API, certificados TLS, etc.
#
# DIFERENCIAS con ConfigMap:
#   - Los valores van en BASE64 (no es cifrado, solo codificación)
#   - Kubernetes los guarda en etcd (puede cifrarse con EncryptionConfig)
#   - Se transmiten por la red solo cuando un Pod los necesita
#   - Pueden restringirse con RBAC
#
# TIPOS de Secret:
#   Opaque              → genérico (el más común)
#   kubernetes.io/tls   → certificados TLS (cert + key)
#   kubernetes.io/dockerconfigjson → credenciales de registro Docker
#   kubernetes.io/service-account-token → tokens de ServiceAccount
#
# CODIFICAR EN BASE64:
#   echo -n "mi-password" | base64      → bWktcGFzc3dvcmQ=
#   echo -n "mi-usuario"  | base64      → bWktdXN1YXJpbw==
#
# DECODIFICAR:
#   echo "bWktcGFzc3dvcmQ=" | base64 --decode
#
# ADVERTENCIA PARA LA CLASE:
#   base64 NO es cifrado. Cualquiera que tenga acceso al YAML
#   puede decodificar los valores. En producción usar:
#   → Sealed Secrets, Vault, External Secrets Operator
#
# COMANDOS ÚTILES:
#   kubectl apply -f 01-secret-opaque.yaml
#   kubectl get secrets
#   kubectl describe secret db-credentials   (NO muestra los valores)
#   kubectl get secret db-credentials -o yaml
#   kubectl get secret db-credentials -o jsonpath='{.data.DB_PASSWORD}' | base64 --decode
#
#   # Crear Secret desde línea de comandos (base64 automático):
#   kubectl create secret generic mi-secret \
#     --from-literal=password=mipassword123 \
#     --from-literal=usuario=admin
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  labels:
    app: demo
type: Opaque              # Tipo genérico
data:
  # Los valores DEBEN estar en base64
  # echo -n "admin"           | base64  →  YWRtaW4=
  # echo -n "password123"     | base64  →  cGFzc3dvcmQxMjM=
  # echo -n "appdb"           | base64  →  YXBwZGI=
  DB_USER: YWRtaW4=           # "admin"
  DB_PASSWORD: cGFzc3dvcmQxMjM=  # "password123"
  DB_NAME: YXBwZGI=           # "appdb"

---
# También puedes usar stringData (Kubernetes hace el base64 automático)
# Útil para escribir el YAML sin codificar manualmente
apiVersion: v1
kind: Secret
metadata:
  name: api-credentials
  labels:
    app: demo
type: Opaque
stringData:               # Kubernetes convierte a base64 automáticamente al guardar
  API_KEY: "mi-clave-api-super-secreta-12345"
  API_URL: "https://api.ejemplo.com"
  TOKEN: "eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9.ejemplo"
