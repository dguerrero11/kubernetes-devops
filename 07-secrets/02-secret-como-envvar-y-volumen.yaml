# ============================================================
# SECRET - Como variables de entorno y como volumen
# ============================================================
# Igual que ConfigMap, los Secrets se pueden usar de dos formas:
#   1. Como variables de entorno (env / envFrom)
#   2. Montados como archivos en un volumen
#
# BUENAS PRÁCTICAS:
#   ✓ Preferir volumen sobre env vars para mayor seguridad:
#     - Las env vars pueden aparecer en logs de error
#     - Los archivos montados tienen permisos más controlados
#   ✓ Nunca loguear variables de entorno en producción
#   ✓ Usar readOnly: true en volumeMounts de Secrets
#
# COMANDOS PARA DEMOSTRAR:
#   kubectl apply -f 01-secret-opaque.yaml       (crear los secrets primero)
#   kubectl apply -f 02-secret-como-envvar-y-volumen.yaml
#
#   # Ver env vars (¡cuidado en producción!):
#   kubectl exec -it pod-con-secret -- env | grep DB_
#
#   # Ver el archivo del secret montado:
#   kubectl exec -it pod-con-secret -- cat /etc/secretos/DB_PASSWORD
#   kubectl exec -it pod-con-secret -- ls -la /etc/secretos/
#
#   # Los archivos del Secret se actualizan automáticamente (como ConfigMap):
#   kubectl edit secret db-credentials
# ============================================================

apiVersion: v1
kind: Pod
metadata:
  name: pod-con-secret
  labels:
    demo: secrets
spec:
  volumes:
    - name: secret-vol
      secret:
        secretName: db-credentials   # Nombre del Secret
        defaultMode: 0400            # Permisos: solo lectura para el owner (rw-------)

  containers:
    - name: app
      image: nginx:1.25

      # MÉTODO 1: Env var con clave específica del Secret
      env:
        - name: DATABASE_USER         # Nombre de la variable en el contenedor
          valueFrom:
            secretKeyRef:
              name: db-credentials   # Nombre del Secret
              key: DB_USER           # Clave dentro del Secret

        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_PASSWORD

      # MÉTODO 2: Todas las claves del Secret como env vars
      # (Menos recomendado, expone todo el secret)
      # envFrom:
      #   - secretRef:
      #       name: db-credentials

      # MÉTODO 3: Montar como archivos (más seguro)
      volumeMounts:
        - name: secret-vol
          mountPath: /etc/secretos   # Cada clave → un archivo aquí
          readOnly: true             # El contenedor no puede modificar los archivos
