# ============================================================
# DEPLOYMENT + PVC - Almacenamiento persistente en la práctica
# ============================================================
# Este ejemplo muestra el flujo completo:
#   PV (admin) → PVC (developer) → Pod (usa el PVC)
#
# DEMO COMPLETA - demostrar persistencia de datos:
#
#   PASO 1: Crear los PVs y PVCs
#   kubectl apply -f 01-persistentvolume-nfs.yaml
#   kubectl apply -f 02-persistentvolumeclaim.yaml
#   kubectl get pvc   (esperar BOUND)
#
#   PASO 2: Crear el deployment
#   kubectl apply -f 03-deployment-con-pvc.yaml
#   kubectl get pods
#
#   PASO 3: Escribir datos en el volumen persistente
#   kubectl exec -it <pod-name> -- bash
#   echo "Datos que sobreviven al Pod" > /datos/test.txt
#   exit
#
#   PASO 4: Eliminar el Pod (el Deployment crea uno nuevo)
#   kubectl delete pod <pod-name>
#   kubectl get pods -w   (ver cómo se crea un Pod nuevo)
#
#   PASO 5: Verificar que los datos persisten en el nuevo Pod
#   kubectl exec -it <nuevo-pod-name> -- cat /datos/test.txt
#   # ¡El archivo sigue ahí! Los datos sobrevivieron al Pod.
#
#   PASO 6: Verificar los datos también en el servidor NFS
#   # En nfs01 (192.168.109.210):
#   ls -la /srv/nfs/k8s/
#   cat /srv/nfs/k8s/test.txt
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-con-storage
  labels:
    app: nginx-storage
spec:
  replicas: 2                   # 2 réplicas leyendo el mismo volumen NFS (RWX)

  selector:
    matchLabels:
      app: nginx-storage

  template:
    metadata:
      labels:
        app: nginx-storage
    spec:
      volumes:
        - name: datos-persistentes
          persistentVolumeClaim:
            claimName: pvc-app-datos   # Referencia al PVC (debe estar en BOUND)

        - name: logs-persistentes
          persistentVolumeClaim:
            claimName: pvc-app-logs

      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          volumeMounts:
            - name: datos-persistentes
              mountPath: /datos         # Los datos van al NFS: /srv/nfs/k8s/

            - name: logs-persistentes
              mountPath: /var/log/nginx # Los logs de nginx al NFS: /srv/nfs/k8s-storage/

          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-storage-svc
spec:
  type: NodePort
  selector:
    app: nginx-storage
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30091
