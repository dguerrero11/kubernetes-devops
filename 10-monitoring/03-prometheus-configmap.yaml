# ============================================================
# CONFIGMAP: Configuración de Prometheus (prometheus.yml)
# ============================================================
# prometheus.yml define:
#   global          → parámetros globales de scraping
#   scrape_configs  → qué targets monitorear y cómo
#   rule_files      → archivos de alertas (opcional)
#
# Jobs configurados:
#   1. prometheus         → Prometheus se monitorea a sí mismo
#   2. kubernetes-nodes   → Node Exporter en cada nodo (métricas del SO)
#   3. kubernetes-pods    → Pods con la annotation prometheus.io/scrape: "true"
#   4. kubernetes-apiservers → API Server de Kubernetes
#
# Para que un Pod sea "autodescubierto" por Prometheus, añadir:
#   annotations:
#     prometheus.io/scrape: "true"
#     prometheus.io/port: "8080"
#     prometheus.io/path: "/metrics"
#
# COMANDOS:
#   kubectl apply -f 03-prometheus-configmap.yaml
#   kubectl get cm prometheus-config -n monitoring
#   kubectl describe cm prometheus-config -n monitoring
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s         # Frecuencia de scraping
      evaluation_interval: 15s     # Frecuencia de evaluación de reglas
      scrape_timeout: 10s

    scrape_configs:

      # ---- Job 1: Prometheus se monitorea a sí mismo ----
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # ---- Job 2: Node Exporter (métricas del SO de cada nodo) ----
      # Node Exporter corre como DaemonSet en el namespace monitoring
      # y expone sus métricas en el puerto 9100
      - job_name: 'node-exporter'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['monitoring']
        relabel_configs:
          - source_labels: [__meta_kubernetes_endpoints_name]
            regex: node-exporter
            action: keep

      # ---- Job 3: Autodescubrimiento de Pods con annotations ----
      # Cualquier Pod con annotation prometheus.io/scrape: "true"
      # será monitoreado automáticamente
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Solo scrapear pods con la annotation de scrape
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Usar el path definido en la annotation (default: /metrics)
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Usar el puerto definido en la annotation
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Preservar labels útiles del Pod
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name

      # ---- Job 4: API Server de Kubernetes ----
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
