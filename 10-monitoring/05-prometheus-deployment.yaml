# ============================================================
# PROMETHEUS - Deployment + Service
# ============================================================
# Puntos clave de esta configuración:
#
# 1. serviceAccountName: prometheus
#    → El Pod usa el ServiceAccount con permisos RBAC para leer el cluster
#
# 2. securityContext (Pod):
#    fsGroup: 65534
#    → Kubernetes cambia el grupo de los archivos del volumen al montar
#    → Necesario para que Prometheus (UID 65534) pueda escribir en el NFS
#
# 3. Volúmenes:
#    - prometheus-data (PVC) → datos TSDB persistentes en NFS
#    - prometheus-config (ConfigMap) → prometheus.yml montado como archivo
#
# 4. args del contenedor:
#    → Configuran retención de datos, directorio de datos, etc.
#
# Acceso:
#   Internamente: http://prometheus-svc:9090 (ClusterIP)
#   Externamente: http://192.168.109.200:30092 (NodePort)
#
# COMANDOS:
#   kubectl apply -f 05-prometheus-deployment.yaml
#   kubectl get pods -n monitoring
#   kubectl logs -n monitoring deploy/prometheus
#   kubectl port-forward -n monitoring svc/prometheus-svc 9090:9090
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app: prometheus
spec:
  replicas: 1                   # Prometheus no soporta HA nativamente (usar Thanos para eso)
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
      annotations:
        prometheus.io/scrape: "true"     # Prometheus se autodescubre a sí mismo
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: prometheus     # Usa los permisos RBAC definidos en 02-prometheus-rbac.yaml

      securityContext:
        fsGroup: 65534                   # GID para los archivos del volumen (usuario "nobody")
        runAsUser: 65534                 # Prometheus corre como "nobody"
        runAsNonRoot: true

      volumes:
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: pvc-prometheus    # Datos TSDB → NFS /srv/nfs/k8s/prometheus

        - name: prometheus-config
          configMap:
            name: prometheus-config      # prometheus.yml desde el ConfigMap

      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"    # Ruta del config
            - "--storage.tsdb.path=/prometheus"                  # Dónde guardar datos
            - "--storage.tsdb.retention.time=15d"                # Retener 15 días de métricas
            - "--web.enable-lifecycle"                           # Permite reload sin reiniciar
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: prometheus-data
              mountPath: /prometheus                # Datos TSDB (NFS)
            - name: prometheus-config
              mountPath: /etc/prometheus            # Configuración (ConfigMap)
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: monitoring
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: web
      protocol: TCP
      port: 9090
      targetPort: 9090
      nodePort: 30092           # http://192.168.109.200:30092
