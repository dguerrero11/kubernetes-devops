# ============================================================
# SECRET: Credenciales de Grafana
# ============================================================
# Almacena el usuario y contraseña de administrador de Grafana.
# Grafana lee estas variables de entorno al iniciar:
#   GF_SECURITY_ADMIN_USER     → usuario admin
#   GF_SECURITY_ADMIN_PASSWORD → contraseña admin
#
# Usamos stringData para no tener que codificar en base64 manualmente.
# Kubernetes lo convierte a base64 internamente al guardar.
#
# En producción: usar una contraseña fuerte y herramientas como
# Vault o Sealed Secrets para gestionar este Secret de forma segura.
#
# COMANDOS:
#   kubectl apply -f 07-grafana-secret.yaml
#   kubectl get secret grafana-credentials -n monitoring
#
#   # Ver el usuario (decodificado):
#   kubectl get secret grafana-credentials -n monitoring \
#     -o jsonpath='{.data.admin-user}' | base64 --decode
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "devops2026"     # Cambiar en producción
