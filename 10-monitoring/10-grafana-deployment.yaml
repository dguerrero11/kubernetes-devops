# ============================================================
# GRAFANA - Deployment + Service
# ============================================================
# Grafana usa CINCO fuentes de configuración (ver cómo se combinan):
#
#   1. Secret "grafana-credentials"
#      → GF_SECURITY_ADMIN_USER y GF_SECURITY_ADMIN_PASSWORD
#
#   2. ConfigMap "grafana-datasource"
#      → /etc/grafana/provisioning/datasources/
#      → Conecta automáticamente con Prometheus al iniciar
#
#   3. PVC "pvc-grafana"
#      → /var/lib/grafana  (datos, SQLite, plugins)
#
#   4. ConfigMap "grafana-dashboard-provider"
#      → /etc/grafana/provisioning/dashboards/
#      → Le dice a Grafana dónde buscar los JSON de dashboards
#
#   5. ConfigMaps "grafana-dashboard-nodos" + "grafana-dashboard-cluster"
#      → /grafana-dashboards/  (projected volume: combina los dos en un dir)
#      → Los archivos JSON de los dashboards preconfigurados
#
# Acceso:
#   Internamente: http://grafana-svc:3000 (ClusterIP)
#   Externamente: http://192.168.109.200:30093
#   Login: admin / devops2026
#
# COMANDOS:
#   kubectl apply -f 10-grafana-deployment.yaml
#   kubectl get pods -n monitoring
#   kubectl logs -n monitoring deploy/grafana
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472            # GID del usuario "grafana" (necesario para el PVC)
        runAsUser: 472
        runAsNonRoot: true

      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: pvc-grafana        # Datos persistentes en NFS

        - name: grafana-datasource
          configMap:
            name: grafana-datasource      # Datasource de Prometheus (auto-provisioning)

        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider  # Le dice a Grafana dónde están los JSON

        - name: grafana-dashboards
          projected:                          # Combina múltiples ConfigMaps en un solo directorio
            sources:
              - configMap:
                  name: grafana-dashboard-nodos    # nodos.json
              - configMap:
                  name: grafana-dashboard-cluster  # cluster.json

      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - name: web
              containerPort: 3000
          env:
            # Credenciales de administrador desde el Secret
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user

            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password

            # Deshabilitar registro de nuevos usuarios (buena práctica)
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"

            # Habilitar modo anónimo de solo lectura (opcional para demos)
            # - name: GF_AUTH_ANONYMOUS_ENABLED
            #   value: "true"

          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana         # Datos persistentes (NFS)

            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources  # Auto-provisioning datasource

            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards   # Auto-provisioning dashboards

            - name: grafana-dashboards
              mountPath: /grafana-dashboards                    # Archivos JSON (fuera del PVC)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-svc
  namespace: monitoring
  labels:
    app: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: web
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30093           # http://192.168.109.200:30093
