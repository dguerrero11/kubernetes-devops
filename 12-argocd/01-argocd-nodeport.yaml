---
# Service NodePort para exponer Argo CD al exterior
# Argo CD instala por defecto un Service ClusterIP llamado argocd-server
# Este Service adicional lo expone con NodePort en el puerto 30095
#
# IMPORTANTE: antes de aplicar este manifest, deshabilitar TLS en argocd-server:
#   kubectl patch deployment argocd-server -n argocd \
#     --type='json' \
#     -p='[{"op":"add","path":"/spec/template/spec/containers/0/args/-","value":"--insecure"}]'
#
# Acceso: http://192.168.109.200:30095
apiVersion: v1
kind: Service
metadata:
  name: argocd-server-nodeport
  namespace: argocd
  labels:
    app.kubernetes.io/component: server
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argocd-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30095
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8080
      nodePort: 30096
      protocol: TCP
