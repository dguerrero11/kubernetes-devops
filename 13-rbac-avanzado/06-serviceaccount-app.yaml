---
# ServiceAccount: identidad para una APLICACIÓN dentro del cluster
# A diferencia de los usuarios humanos, las apps usan ServiceAccounts
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-sa
  namespace: devops-dev
  labels:
    app: rbac-demo
---
# Role: permisos mínimos para la aplicación (principio de mínimo privilegio)
# Esta app solo necesita leer su propia configuración (ConfigMaps)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-role
  namespace: devops-dev
  labels:
    app: rbac-demo
rules:
  # La app puede leer su ConfigMap de configuración
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # La app puede listar pods de su mismo namespace (para auto-discovery)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# RoleBinding: une el ServiceAccount con el Role
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-rolebinding
  namespace: devops-dev
  labels:
    app: rbac-demo
subjects:
  # Un ServiceAccount se identifica con kind: ServiceAccount
  - kind: ServiceAccount
    name: app-sa
    namespace: devops-dev
roleRef:
  kind: Role
  name: app-role
  apiGroup: rbac.authorization.k8s.io
