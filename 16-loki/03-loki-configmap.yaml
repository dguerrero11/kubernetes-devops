apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app: loki
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: info

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    # Configuración de retención de logs
    limits_config:
      retention_period: 744h       # 31 días
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
      max_query_series: 5000
      max_entries_limit_per_query: 5000

    # Cache para acelerar queries
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100

    # Esquema de almacenamiento
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    # Compactación y retención (aplica la retention_period)
    compactor:
      working_directory: /loki/compactor
      shared_store: filesystem
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    # Alertmanager (opcional, se puede conectar al Prometheus del módulo 10)
    ruler:
      alertmanager_url: http://prometheus.monitoring.svc.cluster.local:9090

    # Analytics deshabilitado
    analytics:
      reporting_enabled: false
