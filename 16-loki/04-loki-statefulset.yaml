apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: monitoring
  labels:
    app: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  serviceName: loki-headless
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001

      initContainers:
        # Asegura que los directorios existan con los permisos correctos en NFS
        - name: init-loki-dirs
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              mkdir -p /loki/chunks /loki/rules /loki/compactor /loki/boltdb-shipper-cache /loki/boltdb-shipper-active
              chown -R 10001:10001 /loki
              chmod -R 777 /loki
          volumeMounts:
            - name: loki-storage
              mountPath: /loki
          securityContext:
            runAsUser: 0

      containers:
        - name: loki
          image: grafana/loki:2.9.6
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
            - name: loki-storage
              mountPath: /loki

      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-storage
          persistentVolumeClaim:
            claimName: loki-pvc
