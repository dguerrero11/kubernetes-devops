apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail

      # Toleration: permite correr en el nodo master (que tiene taint NoSchedule)
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          effect: NoSchedule

      # Prioridad alta: los logs no deben perderse si hay presión de recursos
      priorityClassName: system-node-critical

      containers:
        - name: promtail
          image: grafana/promtail:2.9.6
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            # Necesario para leer archivos de log en /var/log (root-owned)
            runAsUser: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
          env:
            # Nombre del nodo (para el label en Loki)
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            # Configuración de Promtail
            - name: config
              mountPath: /etc/promtail
            # Logs de pods de Kubernetes
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            # Logs de contenedores (symlinks)
            - name: containers-logs
              mountPath: /var/log/containers
              readOnly: true
            # Journal de systemd
            - name: journal
              mountPath: /var/log/journal
              readOnly: true
            # Machine ID (necesario para leer el journal)
            - name: machine-id
              mountPath: /etc/machine-id
              readOnly: true
            # Posición de lectura (en memoria tmpfs para sobrevivir reinicios del contenedor)
            - name: positions
              mountPath: /run/promtail

      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: containers-logs
          hostPath:
            path: /var/log/containers
        - name: journal
          hostPath:
            path: /var/log/journal
            type: DirectoryOrCreate
        - name: machine-id
          hostPath:
            path: /etc/machine-id
        - name: positions
          emptyDir: {}
