#     {
#       "op": "add",
#       "path": "/spec/template/spec/containers/0/volumeMounts/-",
#       "value": {
#         "name": "rules-infra",
#         "mountPath": "/etc/prometheus/rules/infra.yml",
#         "subPath": "infra.yml"
