apiVersion: v1
kind: ConfigMap
metadata:
  name: webhook-receiver-app
  namespace: monitoring
  labels:
    app: webhook-receiver
data:
  app.py: |
    #!/usr/bin/env python3
    """
    Webhook Receiver para AlertManager
    Recibe alertas de AlertManager y las muestra en una UI web sencilla.
    Útil para demos y aprendizaje sin necesitar Slack/Email/PagerDuty.
    """
    import json
    import os
    from datetime import datetime
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from collections import deque

    # Almacén en memoria: máximo 100 alertas
    ALERTS = deque(maxlen=100)
    STATS  = {"total": 0, "firing": 0, "resolved": 0}

    HTML_TEMPLATE = """<!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta http-equiv="refresh" content="10">
      <title>AlertManager Webhook — Demo</title>
      <style>
        * {{ box-sizing: border-box; margin: 0; padding: 0; }}
        body {{ font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #e0e0e0; }}
        .header {{
          background: linear-gradient(135deg, #1a1f2e, #2d3748);
          padding: 20px 30px; border-bottom: 3px solid #e6522c;
          display: flex; align-items: center; justify-content: space-between;
        }}
        .header h1 {{ color: #e6522c; font-size: 1.6em; }}
        .header .subtitle {{ color: #888; font-size: 0.85em; margin-top: 4px; }}
        .refresh {{ color: #666; font-size: 0.8em; }}
        .stats {{
          display: flex; gap: 20px; padding: 15px 30px;
          background: #1a1f2e; border-bottom: 1px solid #2d3748;
        }}
        .stat {{
          background: #242938; border-radius: 8px; padding: 12px 20px;
          text-align: center; min-width: 100px;
        }}
        .stat .num {{ font-size: 2em; font-weight: bold; }}
        .stat .label {{ font-size: 0.75em; color: #888; text-transform: uppercase; }}
        .stat.total .num {{ color: #9ecfff; }}
        .stat.firing .num {{ color: #ff4d4d; }}
        .stat.resolved .num {{ color: #52c41a; }}
        .alerts {{ padding: 20px 30px; }}
        .no-alerts {{
          text-align: center; color: #444; padding: 60px;
          border: 2px dashed #2d3748; border-radius: 12px; margin: 20px 0;
        }}
        .no-alerts .icon {{ font-size: 3em; }}
        .alert-card {{
          background: #1a1f2e; border-radius: 10px; margin-bottom: 15px;
          border-left: 5px solid #666; overflow: hidden;
          box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }}
        .alert-card.firing {{ border-left-color: #ff4d4d; }}
        .alert-card.resolved {{ border-left-color: #52c41a; }}
        .alert-card.critical {{ border-left-color: #ff1744; }}
        .alert-card.warning {{ border-left-color: #ff9800; }}
        .alert-header {{
          padding: 12px 16px; display: flex;
          align-items: center; justify-content: space-between;
          background: rgba(255,255,255,0.03);
        }}
        .alert-name {{ font-size: 1.1em; font-weight: bold; }}
        .badges {{ display: flex; gap: 8px; align-items: center; }}
        .badge {{
          padding: 3px 10px; border-radius: 12px;
          font-size: 0.75em; font-weight: bold; text-transform: uppercase;
        }}
        .badge.status-firing {{ background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d; }}
        .badge.status-resolved {{ background: #52c41a22; color: #52c41a; border: 1px solid #52c41a; }}
        .badge.sev-critical {{ background: #ff174422; color: #ff1744; border: 1px solid #ff1744; }}
        .badge.sev-warning {{ background: #ff980022; color: #ff9800; border: 1px solid #ff9800; }}
        .badge.sev-info {{ background: #2196f322; color: #2196f3; border: 1px solid #2196f3; }}
        .alert-body {{ padding: 12px 16px; }}
        .summary {{ color: #ccc; margin-bottom: 8px; }}
        .description {{ color: #888; font-size: 0.9em; line-height: 1.5; }}
        .meta {{
          display: flex; gap: 20px; margin-top: 10px;
          font-size: 0.8em; color: #555;
        }}
        .meta span {{ display: flex; align-items: center; gap: 4px; }}
        .received-at {{ color: #888; font-size: 0.8em; }}
        .alerts-title {{
          color: #888; font-size: 0.85em; text-transform: uppercase;
          letter-spacing: 1px; margin-bottom: 15px; padding-bottom: 8px;
          border-bottom: 1px solid #2d3748;
        }}
      </style>
    </head>
    <body>
      <div class="header">
        <div>
          <h1>🚨 AlertManager Webhook — Demo</h1>
          <div class="subtitle">kubernetes-devops | namespace: monitoring</div>
        </div>
        <div class="refresh">Auto-refresh: 10s</div>
      </div>
      <div class="stats">
        <div class="stat total"><div class="num">{total}</div><div class="label">Total</div></div>
        <div class="stat firing"><div class="num">{firing}</div><div class="label">Firing</div></div>
        <div class="stat resolved"><div class="num">{resolved}</div><div class="label">Resolved</div></div>
      </div>
      <div class="alerts">
        <div class="alerts-title">Últimas alertas recibidas (más reciente primero)</div>
        {alerts_html}
      </div>
    </body>
    </html>"""

    def render_alert_card(alert_group):
        status  = alert_group.get("status", "unknown")
        recv_at = alert_group.get("received_at", "")
        html_parts = []
        for alert in alert_group.get("alerts", []):
            labels  = alert.get("labels", {})
            annots  = alert.get("annotations", {})
            name    = labels.get("alertname", "Unknown")
            sev     = labels.get("severity", "info")
            ns      = labels.get("namespace", "-")
            summary = annots.get("summary", "")
            desc    = annots.get("description", "")
            card_class = f"alert-card {status} {sev}"
            status_badge = f'<span class="badge status-{status}">{status.upper()}</span>'
            sev_badge    = f'<span class="badge sev-{sev}">{sev.upper()}</span>'
            html_parts.append(f"""
              <div class="{card_class}">
                <div class="alert-header">
                  <div class="alert-name">{name}</div>
                  <div class="badges">{sev_badge} {status_badge}</div>
                </div>
                <div class="alert-body">
                  {f'<div class="summary">{summary}</div>' if summary else ''}
                  {f'<div class="description">{desc}</div>' if desc else ''}
                  <div class="meta">
                    <span>📦 {ns}</span>
                    <span>🕐 {recv_at}</span>
                  </div>
                </div>
              </div>""")
        return "\n".join(html_parts)

    class WebhookHandler(BaseHTTPRequestHandler):
        def log_message(self, format, *args):
            pass  # Silenciar logs de HTTP por defecto

        def do_POST(self):
            if self.path == "/alerts":
                length = int(self.headers.get("Content-Length", 0))
                body   = self.rfile.read(length)
                try:
                    data = json.loads(body)
                    data["received_at"] = datetime.now().strftime("%H:%M:%S %d/%m/%Y")
                    ALERTS.appendleft(data)
                    STATS["total"] += 1
                    status = data.get("status", "")
                    if status == "firing":
                        STATS["firing"] += 1
                        print(f"[FIRING] {data.get('alerts', [{}])[0].get('labels', {}).get('alertname', '?')} "
                              f"— {data.get('alerts', [{}])[0].get('annotations', {}).get('summary', '')}")
                    elif status == "resolved":
                        STATS["resolved"] += 1
                        STATS["firing"]   = max(0, STATS["firing"] - 1)
                        print(f"[RESOLVED] {data.get('alerts', [{}])[0].get('labels', {}).get('alertname', '?')}")
                    self.send_response(200)
                    self.end_headers()
                    self.wfile.write(b'{"status":"ok"}')
                except Exception as e:
                    print(f"Error procesando alerta: {e}")
                    self.send_response(400)
                    self.end_headers()
            else:
                self.send_response(404); self.end_headers()

        def do_GET(self):
            if self.path in ("/", "/alerts"):
                if not ALERTS:
                    alerts_html = '''
                      <div class="no-alerts">
                        <div class="icon">✅</div>
                        <p style="margin-top:15px;font-size:1.2em">Sin alertas aún</p>
                        <p style="margin-top:8px;color:#666">
                          Activa el modo caos para ver alertas:<br>
                          <code>kubectl patch configmap chaos-config -n monitoring --type merge -p \'{"data":{"CHAOS_MODE":"true"}}\' </code>
                        </p>
                      </div>'''
                else:
                    alerts_html = "\n".join(render_alert_card(a) for a in ALERTS)
                html = HTML_TEMPLATE.format(
                    total=STATS["total"], firing=STATS["firing"],
                    resolved=STATS["resolved"], alerts_html=alerts_html
                )
                self.send_response(200)
                self.send_header("Content-Type", "text/html; charset=utf-8")
                self.end_headers()
                self.wfile.write(html.encode())
            elif self.path == "/healthz":
                self.send_response(200); self.end_headers()
                self.wfile.write(b'{"status":"ok"}')
            else:
                self.send_response(404); self.end_headers()

    if __name__ == "__main__":
        port = int(os.getenv("PORT", 5001))
        print(f"Webhook Receiver escuchando en :{port}")
        print(f"UI disponible en: http://192.168.109.200:30098")
        HTTPServer(("0.0.0.0", port), WebhookHandler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: monitoring
  labels:
    app: webhook-receiver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      containers:
        - name: webhook
          image: python:3.11-slim
          command: ["python3", "/app/app.py"]
          ports:
            - containerPort: 5001
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: webhook-receiver-app
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver-svc
  namespace: monitoring
  labels:
    app: webhook-receiver
spec:
  type: NodePort
  selector:
    app: webhook-receiver
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30098
