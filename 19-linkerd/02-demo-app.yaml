# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: configuración de nginx para el frontend (actúa como reverse proxy)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: linkerd-demo
data:
  nginx.conf: |
    server {
      listen 80;

      location / {
        proxy_pass http://backend-svc:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header X-Served-By "frontend" always;
      }

      location /health {
        return 200 "frontend ok\n";
        add_header Content-Type text/plain;
      }
    }

---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: respuesta de backend-v1 (versión estable)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-v1-config
  namespace: linkerd-demo
data:
  nginx.conf: |
    server {
      listen 8080;

      location / {
        return 200 "Backend V1 - Estable\n";
        add_header Content-Type text/plain;
        add_header X-Version "v1" always;
      }

      location /api/data {
        return 200 "{\"version\": \"v1\", \"status\": \"ok\", \"message\": \"Respuesta de backend estable\"}\n";
        add_header Content-Type application/json;
        add_header X-Version "v1" always;
      }

      location /health {
        return 200 "v1 ok\n";
        add_header Content-Type text/plain;
      }
    }

---
# ─────────────────────────────────────────────────────────────────────────────
# ConfigMap: respuesta de backend-v2 (versión canary)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-v2-config
  namespace: linkerd-demo
data:
  nginx.conf: |
    server {
      listen 8080;

      location / {
        return 200 "Backend V2 - Canary\n";
        add_header Content-Type text/plain;
        add_header X-Version "v2" always;
      }

      location /api/data {
        return 200 "{\"version\": \"v2\", \"status\": \"ok\", \"message\": \"Respuesta de backend canary (nueva version)\"}\n";
        add_header Content-Type application/json;
        add_header X-Version "v2" always;
      }

      location /health {
        return 200 "v2 ok\n";
        add_header Content-Type text/plain;
      }
    }

---
# ─────────────────────────────────────────────────────────────────────────────
# Deployment: Frontend
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: linkerd-demo
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: frontend-config

---
# ─────────────────────────────────────────────────────────────────────────────
# Service: Frontend (NodePort para acceso desde fuera del cluster)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: frontend-svc
  namespace: linkerd-demo
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30100

---
# ─────────────────────────────────────────────────────────────────────────────
# Deployment: Backend V1 (versión estable — recibe 90% del tráfico)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v1
  namespace: linkerd-demo
  labels:
    app: backend
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
      version: v1
  template:
    metadata:
      labels:
        app: backend
        version: v1
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: backend-v1-config

---
# Service: Backend V1
apiVersion: v1
kind: Service
metadata:
  name: backend-v1-svc
  namespace: linkerd-demo
spec:
  selector:
    app: backend
    version: v1
  ports:
  - port: 8080
    targetPort: 8080

---
# ─────────────────────────────────────────────────────────────────────────────
# Deployment: Backend V2 (versión canary — recibe 10% del tráfico)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-v2
  namespace: linkerd-demo
  labels:
    app: backend
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
      version: v2
  template:
    metadata:
      labels:
        app: backend
        version: v2
    spec:
      containers:
      - name: nginx
        image: nginx:1.25
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"
      volumes:
      - name: config
        configMap:
          name: backend-v2-config

---
# Service: Backend V2
apiVersion: v1
kind: Service
metadata:
  name: backend-v2-svc
  namespace: linkerd-demo
spec:
  selector:
    app: backend
    version: v2
  ports:
  - port: 8080
    targetPort: 8080

---
# ─────────────────────────────────────────────────────────────────────────────
# Service: Backend (padre virtual — el frontend apunta aquí)
# El HTTPRoute en 03-traffic-split.yaml distribuye el tráfico entre v1 y v2
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: linkerd-demo
spec:
  # Sin selector: el HTTPRoute de Linkerd controla a dónde va el tráfico
  ports:
  - port: 8080
    targetPort: 8080
