# ─────────────────────────────────────────────────────────────────────────────
# Canary Deployment: Traffic Splitting en Linkerd
#
# MÉTODO USADO EN LA CLASE: Escalado de réplicas (más fiable en Linkerd v2.14)
#   - backend-v1: 9 réplicas → recibe ~90% del tráfico (round-robin)
#   - backend-v2: 1 réplica  → recibe ~10% del tráfico (round-robin)
#
# NOTA sobre HTTPRoute traffic splitting en Linkerd v2.14:
#   El soporte de Gateway API HTTPRoute para traffic splitting por pesos
#   requiere configuración adicional (EndpointSlice explícito, modo gateway).
#   En Linkerd v2.15+ el soporte HTTPRoute está mejorado.
#   Para esta clase usamos el método de escalado que demuestra el mismo concepto.
#
# Comandos para aplicar el split 90/10:
#   kubectl scale deployment backend-v1 -n linkerd-demo --replicas=9
#   kubectl scale deployment backend-v2 -n linkerd-demo --replicas=1
#
# Para subir gradualmente la versión canary:
#   Fase 1: v1=9, v2=1   → 90/10
#   Fase 2: v1=5, v2=5   → 50/50
#   Fase 3: v1=1, v2=9   → 10/90
#   Fase 4: kubectl scale deployment backend-v1 --replicas=0  → 100% v2
#
# Rollback instantáneo:
#   kubectl scale deployment backend-v2 -n linkerd-demo --replicas=0
# ─────────────────────────────────────────────────────────────────────────────

# Estado inicial: el split se controla por número de réplicas.
# Ver comandos de kubectl scale arriba para ajustar la distribución.
#
# El Service backend-svc tiene selector app=backend → incluye todos los pods.
# Linkerd distribuye el tráfico entre todos los endpoints (round-robin por defecto).
