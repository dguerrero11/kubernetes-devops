# ─────────────────────────────────────────────────────────────────────────────
# ServiceProfile: Retries y Timeouts por ruta HTTP
#
# Define el comportamiento del proxy de Linkerd para el servicio backend-svc.
#
# ESTRUCTURA CORRECTA en Linkerd v2.14:
#   - retryBudget → campo TOP-LEVEL en spec (aplica a todo el servicio)
#   - isRetryable → campo por RUTA (marca rutas que pueden reintentarse)
#   - timeout     → campo por RUTA
#   - responseClasses → campo por RUTA
#
# NOMBRE: debe ser exactamente <service>.<namespace>.svc.cluster.local
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: backend-svc.linkerd-demo.svc.cluster.local
  namespace: linkerd-demo
spec:
  # retryBudget es TOP-LEVEL: aplica a todas las rutas marcadas con isRetryable
  # retryRatio: por cada 10 req normales, permite 2 reintentos (20%)
  # minRetriesPerSecond: mínimo garantizado aunque el budget esté agotado
  # ttl: ventana de tiempo para calcular el budget
  retryBudget:
    retryRatio: 0.2
    minRetriesPerSecond: 10
    ttl: 10s

  routes:
  # ─────────────────────────────────────────
  # Ruta: GET /api/data
  # ─────────────────────────────────────────
  - name: GET /api/data
    condition:
      method: GET
      pathRegex: /api/data
    # Timeout por ruta: si el backend no responde en 500ms → error
    timeout: 500ms
    # Marcar esta ruta como reintentable (usa el retryBudget del spec)
    isRetryable: true
    # Clasificar 5xx como errores para las métricas de success rate
    responseClasses:
    - condition:
        status:
          min: 500
          max: 599
      isFailure: true

  # ─────────────────────────────────────────
  # Ruta: GET / (resto de rutas)
  # ─────────────────────────────────────────
  - name: GET /
    condition:
      method: GET
      pathRegex: /.*
    timeout: 1s
    isRetryable: true
    responseClasses:
    - condition:
        status:
          min: 500
          max: 599
      isFailure: true
