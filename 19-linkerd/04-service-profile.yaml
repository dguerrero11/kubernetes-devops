# ─────────────────────────────────────────────────────────────────────────────
# ServiceProfile: Retries y Timeouts por ruta HTTP
#
# Define el comportamiento del proxy de Linkerd para el servicio backend-svc:
#   - Timeout por ruta
#   - Retry budget (presupuesto de reintentos)
#   - Clasificación de respuestas como éxito o error
#
# IMPORTANTE: El nombre debe ser exactamente:
#   <service>.<namespace>.svc.cluster.local
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: linkerd.io/v1alpha2
kind: ServiceProfile
metadata:
  name: backend-svc.linkerd-demo.svc.cluster.local
  namespace: linkerd-demo
spec:
  routes:
  # ─────────────────────────────────────────
  # Ruta: GET /api/data
  # ─────────────────────────────────────────
  - name: GET /api/data
    condition:
      method: GET
      pathRegex: /api/data
    # Timeout: si el backend no responde en 500ms, el proxy retorna error
    timeout: 500ms
    # Clasificar 5xx como errores (para métricas de success rate)
    responseClasses:
    - condition:
        status:
          min: 500
          max: 599
      isFailure: true
    # Retry budget: Linkerd puede reintentar hasta el 20% de solicitudes fallidas
    # minRetriesPerSecond: mínimo de reintentos permitidos aunque el budget sea 0
    # ttl: tiempo de vida de los contadores del budget
    retryBudget:
      retryRatio: 0.2
      minRetriesPerSecond: 10
      ttl: 10s

  # ─────────────────────────────────────────
  # Ruta: GET / (cualquier otra ruta)
  # ─────────────────────────────────────────
  - name: GET /
    condition:
      method: GET
      pathRegex: /.*
    timeout: 1s
    responseClasses:
    - condition:
        status:
          min: 500
          max: 599
      isFailure: true
    retryBudget:
      retryRatio: 0.1
      minRetriesPerSecond: 5
      ttl: 10s

# ─────────────────────────────────────────────────────────────────────────────
# ¿Cómo funciona el Retry Budget?
#
# retryRatio: 0.2 → por cada 10 solicitudes normales, permite 2 reintentos
# minRetriesPerSecond: 10 → siempre permite al menos 10 reintentos/seg
#
# Ejemplo:
#   - 100 req/s llegan al backend
#   - 30 fallan (30% error rate)
#   - Linkerd puede reintentar 20 (retryRatio=0.2 × 100)
#   - Éxito efectivo en UI: los 20 reintentos exitosos cuentan como éxitos
#   - El success rate visible sube aunque el backend falle
# ─────────────────────────────────────────────────────────────────────────────
