---
# ConfigMap v1 — Versión estable (fondo azul)
# Montado como volumen en webapp-stable deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-html-v1
  namespace: canary-demo
  labels:
    app: webapp
    version: stable
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta http-equiv="refresh" content="3">
      <title>WebApp v1.0 - STABLE</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
          color: white;
          font-family: 'Segoe UI', Arial, sans-serif;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .card {
          background: rgba(255,255,255,0.12);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255,255,255,0.25);
          border-radius: 20px;
          padding: 50px 60px;
          text-align: center;
          max-width: 600px;
          width: 90%;
          box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .version-icon { font-size: 5em; margin-bottom: 10px; }
        h1 { font-size: 2.8em; font-weight: 700; margin-bottom: 5px; }
        .badge {
          display: inline-block;
          background: #2563eb;
          border: 2px solid rgba(255,255,255,0.4);
          padding: 8px 24px;
          border-radius: 50px;
          font-size: 1.1em;
          font-weight: 600;
          margin: 20px 0;
          letter-spacing: 1px;
        }
        .info-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 15px;
          margin: 30px 0;
        }
        .info-item {
          background: rgba(255,255,255,0.08);
          border-radius: 12px;
          padding: 15px;
        }
        .info-label { font-size: 0.75em; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 1.1em; font-weight: 600; margin-top: 5px; }
        .footer { margin-top: 30px; opacity: 0.45; font-size: 0.8em; }
        .pulse {
          display: inline-block;
          width: 10px; height: 10px;
          background: #86efac;
          border-radius: 50%;
          margin-right: 6px;
          animation: pulse 2s infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.5; transform: scale(1.3); }
        }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="version-icon">🟦</div>
        <h1>WebApp</h1>
        <div class="badge">VERSION 1.0 — STABLE</div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Entorno</div>
            <div class="info-value">Producción</div>
          </div>
          <div class="info-item">
            <div class="info-label">Release</div>
            <div class="info-value">2026-03-01</div>
          </div>
          <div class="info-item">
            <div class="info-label">Canal</div>
            <div class="info-value"><span class="pulse"></span>STABLE</div>
          </div>
          <div class="info-item">
            <div class="info-label">Features</div>
            <div class="info-value">API REST básica</div>
          </div>
        </div>
        <p style="opacity:0.7; font-size:0.95em;">
          Esta instancia sirve el <strong>90%</strong> del tráfico durante el canary.
        </p>
        <div class="footer">Kubernetes · Módulo 20 — Canary + CI/CD · DevOps 2026</div>
      </div>
    </body>
    </html>

---
# ConfigMap v2 — Versión canary (fondo verde)
# Montado como volumen en webapp-canary deployment
apiVersion: v1
kind: ConfigMap
metadata:
  name: webapp-html-v2
  namespace: canary-demo
  labels:
    app: webapp
    version: canary
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="es">
    <head>
      <meta charset="UTF-8">
      <meta http-equiv="refresh" content="3">
      <title>WebApp v2.0 - CANARY ⚡</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          background: linear-gradient(135deg, #14532d 0%, #15803d 50%, #16a34a 100%);
          color: white;
          font-family: 'Segoe UI', Arial, sans-serif;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .card {
          background: rgba(255,255,255,0.12);
          backdrop-filter: blur(10px);
          border: 1px solid rgba(255,255,255,0.25);
          border-radius: 20px;
          padding: 50px 60px;
          text-align: center;
          max-width: 600px;
          width: 90%;
          box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .version-icon { font-size: 5em; margin-bottom: 10px; }
        h1 { font-size: 2.8em; font-weight: 700; margin-bottom: 5px; }
        .badge {
          display: inline-block;
          background: #16a34a;
          border: 2px solid rgba(255,255,255,0.4);
          padding: 8px 24px;
          border-radius: 50px;
          font-size: 1.1em;
          font-weight: 600;
          margin: 20px 0;
          letter-spacing: 1px;
        }
        .new-badge {
          display: inline-block;
          background: #facc15;
          color: #14532d;
          padding: 3px 12px;
          border-radius: 20px;
          font-size: 0.7em;
          font-weight: 700;
          margin-left: 8px;
          vertical-align: middle;
        }
        .info-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 15px;
          margin: 30px 0;
        }
        .info-item {
          background: rgba(255,255,255,0.08);
          border-radius: 12px;
          padding: 15px;
        }
        .info-label { font-size: 0.75em; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 1.1em; font-weight: 600; margin-top: 5px; }
        .footer { margin-top: 30px; opacity: 0.45; font-size: 0.8em; }
        .canary-indicator {
          display: inline-block;
          width: 10px; height: 10px;
          background: #facc15;
          border-radius: 50%;
          margin-right: 6px;
          animation: pulse 1s infinite;
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; transform: scale(1); }
          50% { opacity: 0.3; transform: scale(1.5); }
        }
      </style>
    </head>
    <body>
      <div class="card">
        <div class="version-icon">🟩</div>
        <h1>WebApp</h1>
        <div class="badge">VERSION 2.0 — CANARY <span class="new-badge">NEW</span></div>
        <div class="info-grid">
          <div class="info-item">
            <div class="info-label">Entorno</div>
            <div class="info-value">Producción (Canary)</div>
          </div>
          <div class="info-item">
            <div class="info-label">Release</div>
            <div class="info-value">2026-03-10</div>
          </div>
          <div class="info-item">
            <div class="info-label">Canal</div>
            <div class="info-value"><span class="canary-indicator"></span>CANARY</div>
          </div>
          <div class="info-item">
            <div class="info-label">Features</div>
            <div class="info-value">API v2 + Performance +40%</div>
          </div>
        </div>
        <p style="opacity:0.7; font-size:0.95em;">
          Esta instancia sirve el tráfico de <strong>prueba canary</strong>.
          Desplegada via <strong>Tekton CI + Argo CD GitOps</strong>.
        </p>
        <div class="footer">Kubernetes · Módulo 20 — Canary + CI/CD · DevOps 2026</div>
      </div>
    </body>
    </html>
