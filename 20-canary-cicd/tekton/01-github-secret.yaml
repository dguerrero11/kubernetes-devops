---
# Secret: GitHub Personal Access Token
# Usado por la Task 'update-canary' para hacer git push al repo.
#
# PASOS PREVIOS (solo una vez):
#   1. Ir a GitHub → Settings → Developer settings → Personal access tokens
#   2. Generate new token (classic)
#   3. Scope: seleccionar "repo" (full control of private repositories)
#   4. Copiar el token generado (solo se muestra una vez)
#   5. Codificar en base64:
#        echo -n "ghp_TU_TOKEN_AQUI" | base64
#   6. Reemplazar el valor de 'token' abajo
#
# IMPORTANTE: Este archivo NO debe commitearse con el token real.
# Usar .gitignore o kubectl create secret directamente:
#
#   kubectl create secret generic github-token \
#     --from-literal=token=ghp_TU_TOKEN_AQUI \
#     -n tekton-pipelines
apiVersion: v1
kind: Secret
metadata:
  name: github-token
  namespace: tekton-pipelines
  labels:
    app: canary-pipeline
type: Opaque
data:
  # Valor en base64 de tu GitHub PAT
  # Reemplazar con: echo -n "ghp_TU_TOKEN" | base64
  token: Z2hwX1BPVU5MX0NPTkZJR1VSQVJBUVE=
  # GitHub username (para git config)
  # echo -n "tu-usuario-github" | base64
  username: ZGd1ZXJyZXJvMTE=
