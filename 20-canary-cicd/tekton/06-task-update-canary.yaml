---
# Task: canary-update-manifest-task
# Actualiza replicas del canary deployment en Git y hace push.
# Argo CD detecta el cambio y sincroniza el cluster.
#
# Pasos:
#   1. Usa 'yq' para cambiar replicas: 0 → N en el canary deployment
#   2. Configura git identity y remote con GitHub PAT
#   3. Commit + push
#   4. Argo CD detecta el cambio y aplica al cluster
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: canary-update-manifest-task
  namespace: tekton-pipelines
  labels:
    app: canary-pipeline
spec:
  description: |
    Actualiza el manifest 04-canary-deployment.yaml en Git con el numero
    de replicas especificado y hace push al repositorio.
    Argo CD detectara el cambio y sincronizara el cluster.

  params:
    - name: canary-replicas
      type: string
      description: "Numero de replicas canary (1=10%, 5=50%, 10=100%)"
      default: "1"

    - name: repo-owner
      type: string
      description: Propietario del repo en GitHub
      default: "dguerrero11"

    - name: repo-name
      type: string
      description: Nombre del repo en GitHub
      default: "kubernetes-devops"

    - name: git-branch
      type: string
      description: Rama de destino para el push
      default: "main"

  workspaces:
    - name: source
      description: Workspace con el repo clonado

  volumes:
    - name: github-token-vol
      secret:
        secretName: github-token

  steps:
    - name: update-replicas
      # alpine en vez de mikefarah/yq — usa sed que opera en el mismo
      # filesystem (rename) y evita el cross-filesystem copy de yq
      image: alpine:3.19
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        set -e
        CANARY_FILE="20-canary-cicd/manifests/04-canary-deployment.yaml"

        echo "========================================"
        echo "  ACTUALIZANDO CANARY DEPLOYMENT"
        echo "========================================"
        echo ""
        echo "Archivo: $CANARY_FILE"
        echo "Replicas actuales:"
        grep "  replicas:" "$CANARY_FILE"

        echo ""
        echo "Actualizando replicas a: $(params.canary-replicas)"

        # sed -i crea temp en el mismo directorio y usa rename()
        # No hace copy cross-filesystem → evita el permission denied con NFS
        sed -i "s/^  replicas: [0-9]*/  replicas: $(params.canary-replicas)/" "$CANARY_FILE"

        echo ""
        echo "Replicas despues de la actualizacion:"
        grep "  replicas:" "$CANARY_FILE"
        echo ""
        echo "Actualizacion completada correctamente."

    - name: git-commit-push
      image: alpine/git:2.43.0
      workingDir: $(workspaces.source.path)
      volumeMounts:
        - name: github-token-vol
          mountPath: /secrets/github
      script: |
        #!/bin/sh
        set -e

        echo "========================================"
        echo "  GIT COMMIT Y PUSH"
        echo "========================================"
        echo ""

        GITHUB_TOKEN=$(cat /secrets/github/token)
        GITHUB_USER=$(cat /secrets/github/username)

        git config user.email "tekton@cicd.local"
        git config user.name "Tekton Pipeline"

        git remote set-url origin \
          "https://${GITHUB_USER}:${GITHUB_TOKEN}@github.com/$(params.repo-owner)/$(params.repo-name).git"

        echo "Remote configurado con autenticacion."
        echo ""

        echo "Cambios a commitear:"
        git diff --stat

        git add 20-canary-cicd/manifests/04-canary-deployment.yaml

        if git diff --cached --quiet; then
          echo ""
          echo "INFO: No hay cambios. El canary ya tenia $(params.canary-replicas) replicas."
          exit 0
        fi

        TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
        COMMIT_MSG="canary: activate v2 with $(params.canary-replicas) replica(s) [Tekton CI ${TIMESTAMP}]"

        git commit -m "$COMMIT_MSG"

        echo ""
        echo "Commit creado:"
        git log --oneline -1

        echo ""
        echo "Haciendo push a origin/$(params.git-branch)..."
        git push origin $(params.git-branch)

        echo ""
        echo "========================================"
        echo "  PUSH EXITOSO"
        echo "========================================"
        echo ""
        echo "Argo CD detectara el cambio en los proximos 3 min."
        echo "Para sincronizar inmediatamente:"
        echo "  argocd app sync webapp-canary"
        echo ""
        echo "Verificar con:"
        echo "  kubectl get deployments -n canary-demo"
        echo "  kubectl get pods -n canary-demo"
