[defaults]
inventory            = inventory/hosts.ini
remote_user          = root
host_key_checking    = False
forks                = 10
timeout              = 30
# En ansible-core >= 2.13: usar default + result_format en lugar del
# callback yaml de community.general (eliminado en community.general 12.0)
stdout_callback      = default
result_format        = yaml
deprecation_warnings = False

[privilege_escalation]
# become=False porque ya operamos como root en los nodos
become        = False
become_method = sudo
